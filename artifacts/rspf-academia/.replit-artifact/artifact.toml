kind = "web"
previewPath = "/"
title = "RSPF Academia"
version = "1.0.0"
id = "artifacts/rspf-academia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19514

[services.development]
run = "pnpm --filter @workspace/rspf-academia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rspf-academia", "run", "build" ]
publicDir = "artifacts/rspf-academia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19514"
BASE_PATH = "/"
